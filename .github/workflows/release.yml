name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in pubspec format (e.g. 1.0.1+2)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ github.event.inputs.version }}/" pubspec.yaml

      - name: Commit and tag
        id: tag
        run: |
          VERSION_NAME="${{ github.event.inputs.version }}"
          TAG="v${VERSION_NAME%%+*}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "Release ${TAG}"
          git tag "${TAG}"
          git push origin HEAD --tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/troopers-release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=troopers
          storeFile=$HOME/troopers-release.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: build/app/outputs/flutter-apk/app-release.apk
